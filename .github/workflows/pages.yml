name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      # GitHub Pages devuelve a veces "Deployment failed, try again later"
      # de forma transitoria: un segundo intento dentro del mismo run lo
      # resuelve (relanzar el job duplicaria el artefacto y falla).
      - id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - id: deployment-retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
