name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      # GitHub Pages devuelve a veces "Deployment failed, try again later"
      # (limite de frecuencia de despliegues): un segundo intento tras una
      # pausa lo resuelve. Relanzar el job entero duplicaria el artefacto.
      - id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - name: Esperar antes de reintentar
        if: steps.deployment.outcome == 'failure'
        run: sleep 60
      - id: deployment-retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
